<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせフォーム</title>
  <link rel="stylesheet" href="test.css">
</head>
  
<body>
    <h2>世界一甘いお店</h2>
  
    <form action="#" method="post">
        <table>
            <tr>
                <th>お名前</th>
                <td>
                    <input type="text" name="name" size="40">
                </td>
            </tr>
          
            <tr>
                <th>近くのお店</th>
                <td>
                    <input type="text" name="shop" size="40">
                </td>
            </tr>

            <tr>
                <th>電話</th>
                <td>
                    <input type="text" name="tel" size="40">
               </td>
           </tr>

           <tr>
               <th>メールアドレス</th>
             　<td>
                   <input type="text" name="email" size="40">
              </td>
          </tr>

          <tr>
              <th>お近くのお店</th>
              <td>
                  <select name="area">
                      <option>北海道・東北</option>
                      <option>関東</option>
                      <option>中部</option>
                      <option>関西</option>
                      <option>中国・四国</option>
                      <option>九州・沖縄</option>
                  </select>
              </td>
           </tr>

          <tr>
              <th>お問い合わせ種別</th>
              <td>
                   <input type="radio" name="type" value="product"> 商品について
                   <input type="radio" name="type" value="shop"> 店舗について
                   <input type="radio" name="type" value="other"> その他    
              </td>
          </tr>

          <tr>
              <th>お問い合わせ内容</th>
              <td>
                  <textarea name="message" cols="30" rows="5"></textarea> 
              </td>
          </tr>

          <tr>
               <td colspan="2">
                   <input type="submit" value="送信">
               </td>
           </tr>
       </table>
    </form>      
</body>           
</html>
