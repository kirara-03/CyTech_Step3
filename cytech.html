<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML総合練習ページ</title>
  <!-- ↓ CSSファイルを読み込んでください「style.css」にすること -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダーを作成してください（h1とpタグを使います） -->
  <header>
    <!-- ここに見出しと説明文を追加 -->
    <h1>HMTL総合練習ページ</h1>
    <p>HMTLの基本タグをまとめて練習できます。</p>
  </header>

  <!-- ナビゲーション（ul, li, aを使用） -->
  <nav>
    <ul>
      <li><a href="#section1">画像・改行・強調</a></li>
      <li><a href="#section2">表(table)</a></li>
      <li><a href="#section3">フォーム</a></li>    
    </ul>
  </nav>

  <main>

    <!-- セクション1：画像・改行・強調 -->
    <section id="section1">
      <h2>画像・改行・強調の例</h2>

      <h3>画像(img)タグの例</h3>
      <!-- 画像なし -->
      <img src="sample.jpg" alt="サンプル画像" width="300">

      <h3>改行 (br) タグの例</h3>
      <p>改行前の文章です。<br>改行後の文章です。</p>

      <h3>強調(strong,em,markなど) の例</h3>
      <p><strong>これは強調（太字）です。</strong></p>
      <p><em>これは斜体（強調）です。</em></p>
      <p><mark>これはハイライトされたテキストです。</mark></p>
      <p><small>これは小さい文字です。</small></p>
    </section>

    
    
    <!-- セクション2：表 -->
    <section id="section2">
      <h2>表（table）の例</h2>
      <table border="2>
        <tr>
          <th>名前</th>
          <th>年齢</th>
          <th>職業</th>
        </tr>
        <tr>
        <td>山田</td>  
        <td>28</td>
        <td>エンジニア</td>
        </tr>
        <tr>
        <td>佐藤</td>  
        <td>35</td>
        <td>デザイナー</td>
        </tr>
      </table>   
    </section>

    <!-- セクション3：フォーム -->
    <section id="section3">
      <h2>フォームの例</h2>

      <!-- フォーム開始 -->
      <form action="#" method="post">

        <!-- TODO: 名前入力欄を作成（label + input） -->

        <!-- TODO: メールアドレス入力欄を作成 -->

        <!-- TODO: メッセージ入力欄（textarea） -->

        <!-- TODO: セレクトボックスを作成 -->

        <!-- TODO: 送信ボタンを追加 -->

      </form>
    </section>

  </main>

  <!-- aside: 補足情報を追加 -->
  <aside>
    <!-- TODO: h2とpで補足情報を記述 -->
  </aside>

  <!-- フッター -->
  <footer>
    <!-- TODO: コピーライト情報を記述 -->
  </footer>

</body>
</html>
